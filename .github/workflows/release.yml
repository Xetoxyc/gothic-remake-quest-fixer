name: release

# release-please watches Conventional Commits on main, keeps a "release PR" with
# the next semver bump + changelog, and on merge tags vX.Y.Z + cuts a release.
# Because a tag pushed by GITHUB_TOKEN does NOT trigger other workflows, the image
# build lives in this same workflow: every push to main publishes :edge + :sha,
# and a release additionally publishes :latest + :X.Y.Z.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # auto-lowercased
          tags: |
            type=raw,value=edge
            type=sha,format=short
            type=raw,value=latest,enable=${{ needs.release-please.outputs.release_created == 'true' }}
            type=raw,value=${{ needs.release-please.outputs.version }},enable=${{ needs.release-please.outputs.release_created == 'true' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64          # Oodle lib is x86_64-only
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
